<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherNow Dashboard</title>
<link rel="stylesheet" href="style.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<div class="container">

    <h1>🌤 WeatherNow Dashboard</h1>

    <!-- Search -->
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city name...">
        <button id="searchBtn">Search</button>
    </div>

    <!-- Validation -->
    <p id="validationMsg" class="warning"></p>

    <!-- Recent Searches -->
    <div id="history"></div>

    <div id="errorBanner"></div>

    <div class="card current-card">
        <h2 id="cityName" class="skeleton"></h2>
        <p id="temp" class="skeleton"></p>
        <p id="desc" class="skeleton"></p>
        <p id="humidity" class="skeleton"></p>
        <p id="wind" class="skeleton"></p>
        <p id="time" class="skeleton"></p>
    </div>

    <div class="toggle-box">
        <button id="toggleUnit">Switch °F</button>
    </div>

    <div class="forecast" id="forecastRow"></div>

</div>

<script src="app.js"></script>
</body>
</html>
